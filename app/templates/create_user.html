{% extends "base.html" %}

{% block title %}Create User{% endblock %}

{% block content %}
<h2>Create New User</h2>

<form method="post">
    <input type="text" name="username" placeholder="Username" required><br>
    <input type="password" name="password" placeholder="Password" required><br>

    <input type="text" name="national_code" placeholder="National Code" required><br>
    <input type="text" name="first_name" placeholder="First Name" required><br>
    <input type="text" name="last_name" placeholder="Last Name" required><br>
    <input type="text" name="phone_number" placeholder="phone_number" required><br>
    <input type="text" name="section" placeholder="Section" required><br>

    <label>
        <input type="checkbox" name="is_admin"> Is Admin
    </label><br>

    <label>
        <input type="checkbox" name="can_assign_turn"> Can Assign Turn
    </label><br>

    <label>
        <input type="checkbox" name="is_active"> Is Active
    </label><br>

    <button type="submit">Create</button>
</form>

<a href="{{ url_for('admin.dashboard') }}">Back to Dashboard</a>
{% endblock %}
