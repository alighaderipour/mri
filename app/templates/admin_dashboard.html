{% extends "base.html" %}

{% block title %}Admin Dashboard{% endblock %}

{% block content %}
<h2>Admin Dashboard</h2>



<h3>All Reservations</h3>
<table border="1">
    <tr>
        <th>ID</th>
        <th>Patient</th>
        <th>Turn</th>
    </tr>
    {% for r in reservations %}
    <tr>
        <td>{{ r.id }}</td>
        <td>{{ r.patient_name }}</td>
        <td>{{ r.turn_date or 'N/A' }} {{ r.turn_hour or '' }}</td>
    </tr>
    {% endfor %}
</table>
{% endblock %}
