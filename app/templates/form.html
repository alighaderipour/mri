{% extends "base.html" %}

{% block title %}Reservation Form{% endblock %}

{% block content %}
<div class="container mt-4">
    <h2 class="mb-4">New MRI Reservation</h2>

    {% with messages = get_flashed_messages() %}
        {% if messages %}
            <div class="alert alert-info">
                {% for msg in messages %}
                    <div>{{ msg }}</div>
                {% endfor %}
            </div>
        {% endif %}
    {% endwith %}

    <form method="post" enctype="multipart/form-data" id="reservationForm" class="row g-3">
        <div class="col-md-6">
            <label class="form-label">Reservation Date</label>
            <input type="text" class="form-control" name="reservation_date" value="{{ today }}" readonly>
        </div>

        <div class="col-md-6">
            <label class="form-label">Applicant National ID</label>
            <input type="text" class="form-control" name="applicant_national_id" value="{{ user.national_code }}" readonly>
        </div>

        <div class="col-md-6">
            <label class="form-label">First Name</label>
            <input type="text" class="form-control" name="application_first_name" value="{{ user.first_name }}" readonly>
        </div>

        <div class="col-md-6">
            <label class="form-label">Last Name</label>
            <input type="text" class="form-control" name="application_last_name" value="{{ user.last_name }}" readonly>
        </div>

        <div class="col-md-6">
            <label class="form-label">Phone Number</label>
            <input type="text" class="form-control" name="application_phone_number" value="{{ user.phone_number }}" readonly>
        </div>

        <div class="col-md-6">
            <label class="form-label">Section</label>
            <input type="text" class="form-control" name="application_section" value="{{ user.section }}" readonly>
        </div>

        <hr class="mt-4">

        <div class="col-md-6">
            <label class="form-label">Patient Name</label>
            <input type="text" class="form-control" name="patient_name" required>
        </div>

        <div class="col-md-6">
            <label class="form-label">Patient Phone Number</label>
            <input type="text" class="form-control" name="patient_phone_number"
            pattern="^09\d{9}$" title="Enter a valid 11-digit Iranian mobile number (e.g., 09123456789)"
            maxlength="11" minlength="11" inputmode="numeric" required>
        </div>

        <div class="col-md-6">
            <label class="form-label">Patient Insurance</label>
            <select class="form-select" name="patient_insurance_name" id="insuranceSelect" required>
                {% for insurance in insurances %}
                    <option value="{{ insurance.name }}" data-image-required="{{ 1 if insurance.image_required else 0 }}"
                    {% if insurance.name == 'ساير' %}selected{% endif %}>
                        {{ insurance.name }}
                    </option>
                {% endfor %}
            </select>
        </div>

        <div class="col-md-6" id="imageUploadDiv" style="display: none;">
            <label class="form-label">Upload Insurance Image</label>
            <input type="file" class="form-control" name="uploaded_image" id="uploadedImageInput" accept="image/*">
        </div>

        <div class="col-md-6">
    <label class="form-label">Tracking Code</label>
    <input type="text" class="form-control" name="tracking_code"
           pattern="^\d{4,6}$" title="Tracking code must be 4 to 6 digits"
           maxlength="6" minlength="4" inputmode="numeric" required>
</div>

        <div class="col-md-12">
            <label class="form-label">Explanation</label>
            <input type="text" class="form-control" name="explanation" required>
        </div>

        <div class="col-12 mt-4">
            <button type="submit" class="btn btn-primary">Submit Reservation</button>
        </div>
    </form>
</div>

<script>
// JavaScript to show/hide image upload field
document.addEventListener('DOMContentLoaded', function() {
    const insuranceSelect = document.getElementById('insuranceSelect');
    const imageUploadDiv = document.getElementById('imageUploadDiv');
    const uploadedImageInput = document.getElementById('uploadedImageInput');

    function toggleImageUpload() {
        const selectedOption = insuranceSelect.options[insuranceSelect.selectedIndex];
        const imageRequired = selectedOption.getAttribute('data-image-required');

        if (imageRequired === '1') {
            imageUploadDiv.style.display = 'block';
            uploadedImageInput.required = true;
        } else {
            imageUploadDiv.style.display = 'none';
            uploadedImageInput.required = false;
            uploadedImageInput.value = ""; // clear any selected file
        }
    }

    toggleImageUpload(); // Initial check

    insuranceSelect.addEventListener('change', toggleImageUpload);
});
</script>
{% endblock %}
