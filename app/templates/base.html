<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}My App{% endblock %}</title>

    <!-- PersianDatepicker CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/persian-datepicker@1.2.0/dist/css/persian-datepicker.min.css">

    <style>
        nav a {
            margin-right: 10px;
            text-decoration: none;
            font-weight: bold;
        }
        nav {
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

<nav>
    <a href="{{ url_for('main.reserve') }}">New Reservation</a>
    <a href="{{ url_for('main.my_reservations') }}">My Reservations</a>
    {% if current_user.is_authenticated %}
        {% if current_user.is_admin %}
            <a href="{{ url_for('admin.dashboard') }}">Admin Dashboard</a>
            <a href="{{ url_for('admin.list_users') }}">User List</a>
            <a href="{{ url_for('admin.view_reservations') }}">All Reservations</a>
        {% elif current_user.can_assign_turn %}
            <a href="{{ url_for('admin.view_reservations') }}">All Reservations</a>
        {% endif %}
        <a href="{{ url_for('auth.logout') }}">Logout</a>
    {% endif %}
</nav>

<hr>

{% block content %}
{% endblock %}

<!-- jQuery (required for Persian Datepicker) -->
<script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>

<!-- PersianDate and PersianDatepicker JS -->
<script src="https://cdn.jsdelivr.net/npm/persian-date/dist/persian-date.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/persian-datepicker@1.2.0/dist/js/persian-datepicker.min.js"></script>

<!-- PersianDatepicker Activation -->
<script>
$(document).ready(function() {
    $(".persian-datepicker").persianDatepicker({
        format: 'YYYY/MM/DD',
        autoClose: true,
        initialValue: false,
    });
});
</script>

</body>
</html>
